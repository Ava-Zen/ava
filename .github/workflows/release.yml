name: Build and Draft Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            tauri-target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
            build-command: npm run tauri:build -- --target x86_64-unknown-linux-gnu
            release-globs: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
          - os: windows-2022
            platform: windows-x64
            tauri-target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
            build-command: npm run tauri:build -- --target x86_64-pc-windows-msvc
            release-globs: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - os: windows-2022
            platform: windows-arm64
            tauri-target: aarch64-pc-windows-msvc
            rust-targets: aarch64-pc-windows-msvc
            build-command: npm run tauri:build -- --target aarch64-pc-windows-msvc
            release-globs: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
          - os: macos-latest
            platform: macos-universal
            tauri-target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            build-command: npm run tauri:build -- --target universal-apple-darwin
            release-globs: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-latest
            platform: android
            rust-targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
            build-command: npm run tauri:android:build -- --apk --aab
            release-globs: |
              src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
              src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

    runs-on: ${{ matrix.os }}
    env:
      # upload-artifact@v4 still uses Node 20 internally on GitHub runners.
      # This env var suppresses the deprecation warning.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: 'npm'   # Uncomment after you commit a package-lock.json
          # cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Java (Android)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configure Android environment
        if: matrix.platform == 'android'
        shell: bash
        run: |
          SDK_PATH="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          NDK_PATH="${ANDROID_NDK_HOME:-${ANDROID_NDK:-$ANDROID_NDK_LATEST_HOME}}"
          echo "ANDROID_HOME=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm install
        # TODO: Change to 'npm ci' and re-enable cache above once package-lock.json is committed


      - name: Get version from package.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version from package.json: $VERSION"

      - name: Build release artifacts
        run: ${{ matrix.build-command }}

      - name: Stage only final release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          shopt -s nullglob
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            for file in $pattern; do
              cp "$file" release-artifacts/
            done
          done <<'EOF'
          ${{ matrix.release-globs }}
          EOF
          echo "Staged files:"
          find release-artifacts -maxdepth 1 -type f | sort || echo "(none)"
          find release-artifacts -maxdepth 1 -type f | grep -q .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ava-${{ matrix.platform }}-${{ steps.get_version.outputs.version }}
          path: release-artifacts/
          retention-days: 7
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Preparing draft release for v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts (debug)
        run: |
          echo "=== Files to be released ==="
          find artifacts -type f | sort
          echo "============================="

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Ava v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.msi
            artifacts/*-setup.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.apk
            artifacts/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
