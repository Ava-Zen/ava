name: Build and Draft Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            tauri-target: x86_64-unknown-linux-gnu
            rust-targets: x86_64-unknown-linux-gnu
          - os: windows-latest
            platform: windows
            tauri-target: x86_64-pc-windows-msvc
            rust-targets: x86_64-pc-windows-msvc
          - os: macos-latest
            platform: macos
            tauri-target: universal-apple-darwin
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    env:
      # upload-artifact@v4 still uses Node 20 internally on GitHub runners.
      # This env var suppresses the deprecation warning.
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          # cache: 'npm'   # Uncomment after you commit a package-lock.json
          # cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm install
        # TODO: Change to 'npm ci' and re-enable cache above once package-lock.json is committed


      - name: Get version from package.json
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version from package.json: $VERSION"

      - name: Build Tauri app
        run: npm run tauri:build -- --target ${{ matrix.tauri-target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ava-${{ matrix.platform }}-${{ steps.get_version.outputs.version }}
          path: |
            src-tauri/target/${{ matrix.tauri-target }}/**/bundle/**
            src-tauri/target/${{ matrix.tauri-target }}/**/*.exe
            src-tauri/target/${{ matrix.tauri-target }}/**/*.msi
            src-tauri/target/${{ matrix.tauri-target }}/**/*.appimage
            src-tauri/target/${{ matrix.tauri-target }}/**/*.deb
            src-tauri/target/${{ matrix.tauri-target }}/**/*.dmg
            src-tauri/target/${{ matrix.tauri-target }}/**/*.app
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Preparing draft release for v$VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List downloaded artifacts (debug)
        run: find artifacts -type f | head -30

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Ava v${{ steps.get_version.outputs.version }}
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
